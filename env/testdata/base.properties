# -----------------------------------------------
# base.properties — generic application configuration
# -----------------------------------------------

# Application
app.name=lx
app.version=1.0.0
app.env=development
app.debug=true
app.description=this is a lx application

# Server
server.host=localhost
server.port=8080
server.context-path=/api

# Database
database.host=localhost
database.port=5432
database.name=lxdb
database.username=admin
database.password=secret
database.driver=org.postgresql.Driver

# Cache
cache.type=redis
cache.host=localhost
cache.port=6379
cache.password=

# Mail
mail.host=smtp.gmail.com
mail.port=587
mail.username=no-reply@lx.dev
mail.auth=true

# Logging
logging.level=INFO
logging.file=logs/app.log

# Edge cases
app.greeting="hello world"
app.single_quoted='single quoted value'
app.stripped=value # this comment should be removed
app.token="abc#123"
app.secret=p@ssw0rd!
app.empty=
